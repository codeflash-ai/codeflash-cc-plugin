name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install BATS
        run: npm install -g bats

      - name: Verify dependencies
        run: |
          bats --version
          jq --version
          git --version

      - name: Run tests
        run: bats tests/